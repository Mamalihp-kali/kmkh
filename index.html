<!DOCTYPE html>

        }

          margin: 0;
          height: 100vh;
          background-color: #000000;
          display: flex;

        .login-box{

rgba(0,0,0,0,2);

          margin-bottom: 20px;
          color: #000000;
        }
        .login-box input{

          padding: 12px;
          margin-top: 15px;
          border: none;
          border-radius: 10px;
          background: #000000;
          color: white;

          transition: 0.3s;
        }
        .login-box button:hover{
